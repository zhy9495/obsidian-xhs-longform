name: Release Obsidian plugin

on:
  push:
    tags: ["*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run validate-release
      - run: node scripts/stamp-release-styles.mjs
      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Verify release attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify main.js --repo "$GITHUB_REPOSITORY"
          gh attestation verify manifest.json --repo "$GITHUB_REPOSITORY"
          gh attestation verify styles.css --repo "$GITHUB_REPOSITORY"
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title="$GITHUB_REF_NAME" --draft main.js manifest.json styles.css
